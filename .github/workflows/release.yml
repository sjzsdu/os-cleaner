name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Get tag
        id: get_tag
        shell: bash
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: go test ./...

      - name: Build (Unix)
        if: matrix.goos != 'windows'
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w -X github.com/juzhongsun/os-cleaner/cmd.Version=${{ steps.get_tag.outputs.TAG }}" -o os-cleaner-${{ steps.get_tag.outputs.TAG }}-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Build (Windows)
        if: matrix.goos == 'windows'
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w -X github.com/juzhongsun/os-cleaner/cmd.Version=${{ steps.get_tag.outputs.TAG }}" -o os-cleaner-${{ steps.get_tag.outputs.TAG }}-${{ matrix.goos }}-${{ matrix.goarch }}.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-cleaner-${{ matrix.goos }}-${{ matrix.goarch }}
          path: os-cleaner-*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: os-cleaner-*
          merge-multiple: true

      - name: Prepare files
        run: |
          ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
